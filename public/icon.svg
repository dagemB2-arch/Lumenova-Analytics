<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#0A0A0A"/>

  <!-- Geometric diamond / lumen mark -->
  <!-- Central diamond shape formed by two triangles -->
  <polygon points="90,28 138,90 90,152 42,90" fill="none" stroke="#2563EB" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Inner rotated square (45°) - tight inner mark -->
  <rect x="69" y="69" width="42" height="42" rx="2" fill="none" stroke="#2563EB" stroke-width="2.5" transform="rotate(45 90 90)"/>

  <!-- Vertical line through center (the "lumen" ray) -->
  <line x1="90" y1="42" x2="90" y2="138" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Horizontal line through center -->
  <line x1="54" y1="90" x2="126" y2="90" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Center dot -->
  <circle cx="90" cy="90" r="5" fill="#2563EB"/>

  <!-- Four corner accent dots at diamond tips -->
  <circle cx="90" cy="31" r="3" fill="#2563EB"/>
  <circle cx="90" cy="149" r="3" fill="#2563EB"/>
  <circle cx="45" cy="90" r="3" fill="#2563EB"/>
  <circle cx="135" cy="90" r="3" fill="#2563EB"/>
</svg>
